<div class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1>🏠 PG Rental</h1>
        <p>Find Your Perfect Room</p>
      </div>

      <div class="alert alert-{{ messageType }}" *ngIf="message">
        {{ message }}
      </div>

      <div class="tabs">
        <button [class.active]="activeTab === 'login'" (click)="switchTab('login')" class="tab">
          Login
        </button>
        <button [class.active]="activeTab === 'register'" (click)="switchTab('register')" class="tab">
          Register
        </button>
      </div>

      <!-- LOGIN FORM -->
      <div class="form-container" *ngIf="activeTab === 'login'" [@slideIn]>
        <form (ngSubmit)="login()" autocomplete="on">
          <div class="form-group">
            <label for="login-email">Email Address</label>
            <input type="email" id="login-email" placeholder="Enter your email" [(ngModel)]="loginForm.email"
              name="email" autocomplete="email" autocapitalize="none" autocorrect="off" spellcheck="false"
              (focus)="onInputFocus()" required />
          </div>

          <div class="form-group">
            <label for="login-password">Password</label>
            <input type="password" id="login-password" placeholder="Enter your password"
              [(ngModel)]="loginForm.password" name="password" autocomplete="current-password" autocapitalize="none"
              autocorrect="off" spellcheck="false" (focus)="onInputFocus()" required />
          </div>

          <a href="#" class="forgot-password" (click)="forgotPassword($event)">Forgot Password?</a>

          <div class="form-group remember-me">
            <label class="checkbox-label">
              <input type="checkbox" [(ngModel)]="rememberMe" name="rememberMe" (change)="onRememberMeChange()" />
              <span class="checkmark"></span>
              Remember me
            </label>
          </div>

          <button type="submit" class="btn btn-primary btn-block" [disabled]="isLoading">
            {{ isLoading ? 'Logging in...' : 'Login' }}
          </button>

          <div class="social-login">
            <p>Or continue with</p>
            <div class="social-buttons">
              <button type="button" class="social-btn google">
                <i class="fab fa-google"></i> Google
              </button>
              <button type="button" class="social-btn github">
                <i class="fab fa-github"></i> GitHub
              </button>
            </div>
          </div>
        </form>
      </div>

      <!-- REGISTER FORM -->
      <div class="form-container" *ngIf="activeTab === 'register'" [@slideIn]>
        <form (ngSubmit)="register()">
          <div class="form-group">
            <label for="register-name">Full Name</label>
            <input type="text" id="register-name" placeholder="Enter your full name" [(ngModel)]="registerForm.name"
              name="name" required />
          </div>

          <div class="form-group">
            <label for="register-email">Email Address</label>
            <input type="email" id="register-email" placeholder="Enter your email" [(ngModel)]="registerForm.email"
              name="email" required />
          </div>

          <div class="form-group">
            <label for="register-password">Password</label>
            <input type="password" id="register-password" placeholder="Enter a strong password"
              [(ngModel)]="registerForm.password" name="password" required />
          </div>

          <div class="form-group">
            <label for="register-confirm">Confirm Password</label>
            <input type="password" id="register-confirm" placeholder="Confirm your password"
              [(ngModel)]="registerForm.confirmPassword" name="confirmPassword" required />
          </div>

          <div class="terms">
            <input type="checkbox" id="terms" required />
            <label for="terms">I agree to the Terms of Service and Privacy Policy</label>
          </div>

          <button type="submit" class="btn btn-primary btn-block" [disabled]="isLoading">
            {{ isLoading ? 'Registering...' : 'Create Account' }}
          </button>

          <div class="social-login">
            <p>Or register with</p>
            <div class="social-buttons">
              <button type="button" class="social-btn google">
                <i class="fab fa-google"></i> Google
              </button>
              <button type="button" class="social-btn github">
                <i class="fab fa-github"></i> GitHub
              </button>
            </div>
          </div>
        </form>
      </div>
    </div>

    <div class="auth-info">
      <div class="info-card">
        <span class="icon">🔒</span>
        <h3>Secure</h3>
        <p>Your data is encrypted and protected</p>
      </div>
      <div class="info-card">
        <span class="icon">⚡</span>
        <h3>Fast</h3>
        <p>Find your perfect PG in seconds</p>
      </div>
      <div class="info-card">
        <span class="icon">✅</span>
        <h3>Verified</h3>
        <p>All listings are verified and legit</p>
      </div>
    </div>
  </div>
</div>
